<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
overflow-x:hidden;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

h1{
font-size:48px;
color:white;
text-shadow:0 3px 10px rgba(0,0,0,0.2);
}

p{
font-size:20px;
color:white;
max-width:600px;
}

button{
padding:12px 28px;
border:none;
border-radius:10px;
background:#ff4b5c;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#ff1e3c;
}

.fade{
display:none;
animation:fadeIn 1s;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

/* music card */

.song{
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
width:320px;
transition:0.3s;
}

.song:hover{
transform:scale(1.05);
}

.song iframe{
width:100%;
height:152px;
border:none;
display:block;
}

/* floating balloons */

.balloon{
position:absolute;
bottom:-150px;
width:60px;
animation:float 10s infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* confetti */

.confetti{
position:fixed;
width:10px;
height:10px;
background:red;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}

#cake3d{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
perspective:1000px;
}

.cake{
position:relative;
transform-style:preserve-3d;
transform: rotateX(-25deg); /* ubah menjadi minus */
}

.layer{
width:200px;
height:50px;
border-radius:10px;
margin:auto;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.layer-bottom{
background:#ffb3c6;
transform:translateZ(0px);
}

.layer-middle{
background:#ff8fab;
transform:translateZ(20px);
}

.layer-top{
background:#ff4d6d;
transform:translateZ(40px);
}

.candles{
display:flex;
justify-content:center;
gap:10px;
position:absolute;
top:-40px;   /* menaikkan lilin ke atas kue */
left:50%;
transform:translateX(-50%);
z-index:10;
}

.candle{
width:10px;
height:40px;
background:#ffd166;
border-radius:3px;
position:relative;
}

.flame{
width:12px;
height:20px;
background:orange;
border-radius:50%;
position:absolute;
top:-18px;
left:-1px;
animation:flicker 0.3s infinite;
}

@keyframes flicker{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<!-- floating balloons -->
<img class="balloon" style="left:10%" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png">
<img class="balloon" style="left:80%;animation-delay:2s" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png">

<!-- cover -->
<section id="cover">

<h1>🎉 Selamat Ulang Tahun 🎉</h1>
<p>Hari ini adalah hari spesialmu</p>

<button onclick="openMessage()">Buka Pesan</button>

</section>

<!-- message -->

<section id="message" class="fade">

<h1>For You 💖</h1>

<p>
Semoga di umur yang baru ini kamu selalu diberi kesehatan,
kebahagiaan, dan semua impianmu tercapai.
Terima kasih sudah menjadi orang yang luar biasa.
Selamat ulang tahun 🎂✨
</p>

<button onclick="showCake()">Kejutan Terakhir 🎁</button>

</section>

<section id="cake3d" class="fade">

    <h1>Make a Wish 🎂</h1>
    
    <div class="cake">
    
    <div class="layer layer-bottom"></div>
    <div class="layer layer-middle"></div>
    <div class="layer layer-top"></div>
    
    <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    </div>
    
    </div>
    
    <button onclick="startMic()">Tiup Lilin dengan Mic 🎤</button>
    
    </section>

<!-- music -->

<section id="music" class="fade">

<h1>Music For You 🎵</h1>

<div class="song">
<iframe
src="https://open.spotify.com/embed/track/7aSyG7cskkG3zhfO2JLxq3"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<div class="song">
<iframe
src="https://open.spotify.com/embed/track/3rPtS4nfpy7PsARctAWpzd"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

</section>

<script>

function openMessage(){

document.getElementById("cover").style.display="none"
document.getElementById("message").style.display="flex"

startConfetti()

}


function showCake(){

document.getElementById("message").style.display="none"
document.getElementById("cake3d").style.display="flex"

}

function showMusic(){

document.getElementById("cake3d").style.display="none"
document.getElementById("music").style.display="flex"

}

function startConfetti(){

for(let i=0;i<80;i++){

let confetti=document.createElement("div")
confetti.className="confetti"

confetti.style.left=Math.random()*100+"vw"
confetti.style.background=`hsl(${Math.random()*360},100%,50%)`
confetti.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(confetti)

}

}
let audioContext
let analyser
let microphone
let dataArray

async function startMic(){

try{

const stream = await navigator.mediaDevices.getUserMedia({ audio: true })

audioContext = new AudioContext()
microphone = audioContext.createMediaStreamSource(stream)

analyser = audioContext.createAnalyser()
analyser.fftSize = 256

microphone.connect(analyser)

dataArray = new Uint8Array(analyser.frequencyBinCount)

detectBlow()

}catch(err){

alert("Izinkan microphone untuk meniup lilin 🎤")

}

}

function detectBlow(){

analyser.getByteFrequencyData(dataArray)

let volume = dataArray.reduce((a,b)=>a+b)/dataArray.length

if(volume > 60){  // sensitivitas tiupan

blowCandles()

return

}

requestAnimationFrame(detectBlow)

}

function blowCandles(){

document.querySelectorAll(".flame").forEach(f=>{
f.style.display="none"
})

startConfetti()

// tunggu 2 detik lalu buka musik
setTimeout(()=>{
showMusic()
},2000)

}

window.onload = function(){

document.getElementById("cover").style.display="flex"
document.getElementById("message").style.display="none"
document.getElementById("cake3d").style.display="none"
document.getElementById("music").style.display="none"


}

</script>

</body>
</html>
